<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ツクール型エディタ — レイアウトプレビュー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #12121f;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── 左サイドバー ── */
  .sidebar {
    width: 280px; min-width: 280px;
    background: #1a1a2e;
    border-right: 1px solid #2a2a3e;
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .sidebar h2 {
    font-size: 13px; padding: 12px 14px 8px;
    color: #7fdbca; border-bottom: 1px solid #2a2a3e;
  }
  .sidebar-section { padding: 8px 10px; border-bottom: 1px solid #222238; }
  .sidebar-section h3 { font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* プリセットボタン */
  .preset-btn {
    display: block; width: 100%; padding: 7px 10px; margin-bottom: 4px;
    border: 1px solid #333; border-radius: 4px;
    background: #222240; color: #ccc; cursor: pointer;
    font-size: 12px; text-align: left; transition: all 0.15s;
  }
  .preset-btn:hover { background: #2a2a50; }
  .preset-btn.active { background: #3a4a6a; border-color: #5a8abf; color: #fff; }

  /* UI部品リスト */
  .el-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; margin-bottom: 2px;
    border-radius: 3px; cursor: pointer;
    font-size: 11px; transition: all 0.1s;
  }
  .el-item:hover { background: #2a2a4a; }
  .el-item.selected { background: #3a3a5a; outline: 1px solid #5a8abf; }
  .el-item .dot {
    width: 10px; height: 10px; border-radius: 2px;
    border: 1px solid #555; flex-shrink: 0;
  }
  .el-item .el-name { flex: 1; }
  .el-item .el-vis {
    width: 16px; height: 16px; border: none; background: none;
    color: #888; cursor: pointer; font-size: 13px; padding: 0;
  }
  .el-item .el-vis:hover { color: #fff; }
  .el-item.hidden-el { opacity: 0.45; }

  /* プロパティパネル */
  .prop-panel {
    padding: 10px; border-top: 1px solid #2a2a3e;
    background: #181830; flex-shrink: 0;
  }
  .prop-panel h3 { font-size: 11px; color: #7fdbca; margin-bottom: 8px; }
  .prop-row {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 5px; font-size: 11px;
  }
  .prop-row label { width: 55px; color: #888; text-align: right; flex-shrink: 0; }
  .prop-row input[type="number"] {
    width: 60px; padding: 3px 5px;
    background: #222244; border: 1px solid #444; border-radius: 3px;
    color: #e0e0e0; font-size: 11px;
  }
  .prop-row input[type="range"] { flex: 1; accent-color: #5a8abf; }
  .prop-row .val { width: 30px; text-align: right; color: #aaa; font-size: 10px; }

  /* ── メイン ── */
  .main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px; position: relative;
  }
  .toolbar {
    display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
    justify-content: center;
  }
  .toolbar button {
    padding: 5px 12px; border: 1px solid #444; border-radius: 4px;
    background: #2a2a4a; color: #ccc; cursor: pointer;
    font-size: 11px; transition: all 0.15s;
  }
  .toolbar button:hover { background: #3a3a6a; }
  .toolbar button.on { background: #3a5a3a; border-color: #5cb85c; }

  #stage-wrap {
    border: 1px solid #333; border-radius: 4px; overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    position: relative;
  }
  #stage { display: block; }
  .coord-display {
    position: absolute; bottom: 4px; right: 8px;
    font-size: 10px; color: #666; pointer-events: none;
  }

  /* ── 右パネル: JSON ── */
  .json-panel {
    width: 320px; min-width: 320px;
    background: #1a1a2e;
    border-left: 1px solid #2a2a3e;
    display: flex; flex-direction: column;
  }
  .json-panel h2 {
    font-size: 13px; padding: 12px 14px 8px;
    color: #7fdbca; border-bottom: 1px solid #2a2a3e;
  }
  .json-panel pre {
    flex: 1; padding: 10px; overflow: auto;
    font-size: 10px; line-height: 1.5;
    color: #a8b8c8; background: #141428;
    font-family: 'SF Mono', 'Consolas', monospace;
  }
  .json-panel .json-actions {
    padding: 8px 10px; border-top: 1px solid #222238;
    display: flex; gap: 6px;
  }
  .json-panel .json-actions button {
    flex: 1; padding: 6px; border: 1px solid #444; border-radius: 4px;
    background: #2a2a4a; color: #ccc; cursor: pointer; font-size: 11px;
  }
  .json-panel .json-actions button:hover { background: #3a3a6a; }
</style>
</head>
<body>

<!-- ── 左サイドバー ── -->
<div class="sidebar">
  <h2>ツクール型 UI エディタ（試作）</h2>

  <div class="sidebar-section">
    <h3>プリセット</h3>

  </div>

<!-- ── メイン ── -->
<div class="main">
  <div class="toolbar">
    <button onclick="toggleGrid()" id="btn-grid">Grid</button>
    <button onclick="toggleLabels()" id="btn-labels" class="on">Labels</button>
    <button onclick="toggleHidden()" id="btn-hidden" class="on">Hidden</button>

    <button onclick="toggleToast()" id="btn-toast">通知 表示</button>
    <button onclick="toggleDrag()" id="btn-drag">ドラッグ移動</button>
  </div>
  <div id="stage-wrap">

  </div>
</div>

<!-- ── 右: JSON ── -->
<div class="json-panel">
  <h2>PlayLayout JSON</h2>
  <pre id="json-output"></pre>
  <div class="json-actions">
    <button onclick="copyJson()">Copy JSON</button>
    <button onclick="exportJson()">Download</button>
  </div>

// ── プリセット ──

      { id: 'skip-button', rect: { x: 1022, y: 10, w: 56, h: 32 }, visible: true, opacity: 0.8, z: 16, text: 'SKIP' },
      { id: 'log-button', rect: { x: 1082, y: 10, w: 56, h: 32 }, visible: true, opacity: 0.8, z: 16, text: 'LOG' },
      { id: 'hide-ui-button', rect: { x: 1142, y: 10, w: 56, h: 32 }, visible: true, opacity: 0.8, z: 16, text: 'HIDE' },
      { id: 'menu-button', rect: { x: 1202, y: 10, w: 68, h: 32 }, visible: true, opacity: 0.8, z: 16, text: 'MENU' },

    name: 'RPG寄り',
    elements: [
      { id: 'message-window', rect: { x: 40, y: 520, w: 1200, h: 180 }, visible: true, opacity: 0.85, z: 10, text: '「冒険者よ、この先には強敵が待ち受けている。\n準備は万全か？」' },
      { id: 'name-box', rect: { x: 60, y: 488, w: 200, h: 30 }, visible: true, opacity: 0.9, z: 11, text: '村長' },
      { id: 'choice-window', rect: { x: 390, y: 180, w: 500, h: 200 }, visible: false, opacity: 0.9, z: 20, text: '▶ 準備は万全だ\n　 もう少し待ってくれ' },
      { id: 'click-wait-icon', rect: { x: 1200, y: 680, w: 24, h: 24 }, visible: true, opacity: 1, z: 12 },
      { id: 'quick-menu-bar', rect: { x: 960, y: 8, w: 312, h: 36 }, visible: true, opacity: 0.7, z: 15 },
      { id: 'auto-button', rect: { x: 962, y: 10, w: 56, h: 32 }, visible: true, opacity: 0.8, z: 16, text: 'AUTO' },
      { id: 'skip-button', rect: { x: 1022, y: 10, w: 56, h: 32 }, visible: true, opacity: 0.8, z: 16, text: 'SKIP' },

      { id: 'mini-map', rect: { x: 1064, y: 380, w: 200, h: 150 }, visible: true, opacity: 0.6, z: 13, text: '[MAP]' },

      { id: 'name-box', rect: { x: 60, y: 202, w: 200, h: 30 }, visible: true, opacity: 0.9, z: 11, text: 'ナレーション' },

      { id: 'auto-button', rect: { x: 962, y: 682, w: 56, h: 32 }, visible: true, opacity: 0.8, z: 16, text: 'AUTO' },
      { id: 'skip-button', rect: { x: 1022, y: 682, w: 56, h: 32 }, visible: true, opacity: 0.8, z: 16, text: 'SKIP' },
      { id: 'log-button', rect: { x: 1082, y: 682, w: 56, h: 32 }, visible: true, opacity: 0.8, z: 16, text: 'LOG' },
      { id: 'menu-button', rect: { x: 1142, y: 682, w: 128, h: 32 }, visible: true, opacity: 0.8, z: 16, text: 'MENU' },
    ],
  },
  'center-msg': {
    name: 'メッセージ中央',
    elements: [
      { id: 'message-window', rect: { x: 140, y: 420, w: 1000, h: 150 }, visible: true, opacity: 0.9, z: 10, text: '「中央寄せのコンパクトなメッセージウィンドウです。\n映画的な演出に向いています。」' },
      { id: 'name-box', rect: { x: 160, y: 390, w: 180, h: 28 }, visible: true, opacity: 0.9, z: 11, text: '???' },
      { id: 'choice-window', rect: { x: 440, y: 160, w: 400, h: 180 }, visible: false, opacity: 0.9, z: 20, text: '▶ Accept\n　 Refuse' },
      { id: 'click-wait-icon', rect: { x: 1100, y: 550, w: 24, h: 24 }, visible: true, opacity: 1, z: 12 },
      { id: 'quick-menu-bar', rect: { x: 16, y: 680, w: 312, h: 36 }, visible: true, opacity: 0.5, z: 15 },
      { id: 'auto-button', rect: { x: 18, y: 682, w: 56, h: 32 }, visible: true, opacity: 0.6, z: 16, text: 'AUTO' },
      { id: 'skip-button', rect: { x: 78, y: 682, w: 56, h: 32 }, visible: true, opacity: 0.6, z: 16, text: 'SKIP' },
      { id: 'log-button', rect: { x: 138, y: 682, w: 56, h: 32 }, visible: true, opacity: 0.6, z: 16, text: 'LOG' },
      { id: 'menu-button', rect: { x: 198, y: 682, w: 128, h: 32 }, visible: true, opacity: 0.6, z: 16, text: 'MENU' },
    ],

};

// ── State ──
let currentPreset = 'novel';
let elements = JSON.parse(JSON.stringify(PRESETS.novel.elements));
let selectedIdx = -1;
let showLabels = true;
let showGrid = false;
let showHidden = true;
let dragEnabled = false;
let dragging = null; // { idx, offsetX, offsetY }

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

// ── Drawing ──
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, 720);
  grad.addColorStop(0, '#0d1b2a');
  grad.addColorStop(0.4, '#1b2838');
  grad.addColorStop(1, '#0a1628');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1280, 720);
  // characters
  ctx.fillStyle = 'rgba(60,60,90,0.25)';
  ctx.beginPath(); ctx.ellipse(640, 500, 120, 280, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(60,60,90,0.12)';
  ctx.beginPath(); ctx.ellipse(400, 520, 100, 260, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(880, 520, 100, 260, 0, 0, Math.PI*2); ctx.fill();
}

function drawGrid() {
  if (!showGrid) return;
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= 1280; x += 64) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,720); ctx.stroke(); }
  for (let y = 0; y <= 720; y += 36) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(1280,y); ctx.stroke(); }
  ctx.strokeStyle = 'rgba(255,100,100,0.12)';
  ctx.setLineDash([4,4]); ctx.strokeRect(64,36,1152,648); ctx.setLineDash([]);
}

function drawEl(el, idx) {
  const c = COLORS[el.id] || { fill:'#333', border:'#666', label: el.id };
  const { x, y, w, h } = el.rect;
  const hidden = !el.visible;
  const alpha = hidden ? 0.2 : el.opacity;
  const isSel = idx === selectedIdx;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = c.fill;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = isSel ? '#fff' : c.border;
  ctx.lineWidth = isSel ? 3 : (hidden ? 1 : 2);
  if (hidden) ctx.setLineDash([4,4]);
  ctx.strokeRect(x, y, w, h);
  if (hidden) ctx.setLineDash([]);

  // selection handles
  if (isSel) {
    ctx.globalAlpha = 0.9;
    const hs = 6;
    ctx.fillStyle = '#fff';
    [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([hx,hy]) => {
      ctx.fillRect(hx-hs/2, hy-hs/2, hs, hs);
    });
  }

  // text
  if (el.text && w > 40 && h > 20) {
    ctx.globalAlpha = hidden ? 0.15 : alpha;
    ctx.fillStyle = '#e0e0e0';
    ctx.font = h < 40 ? '12px sans-serif' : '14px sans-serif';
    const lines = el.text.split('\n');
    const lh = h < 40 ? 15 : 20;
    const ty = y + (h < 40 ? 20 : 28);
    lines.forEach((line, i) => { if (ty + i*lh < y + h - 4) ctx.fillText(line, x+10, ty+i*lh); });
  }

  // label
  if (showLabels) {
    ctx.globalAlpha = hidden ? 0.35 : 0.85;
    const lt = c.label + (hidden ? ' (hidden)' : '');
    ctx.font = '10px sans-serif';
    const tw = ctx.measureText(lt).width;
    const lx = x + 2, ly = y - 3;
    if (ly > 12) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(lx-1,ly-10,tw+6,13);
      ctx.fillStyle = isSel ? '#fff' : c.border; ctx.fillText(lt, lx+2, ly);
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(x+2,y+2,tw+6,13);
      ctx.fillStyle = isSel ? '#fff' : c.border; ctx.fillText(lt, x+5, y+12);
    }
  }
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, 1280, 720);
  drawBg();
  drawGrid();
  const sorted = elements.map((e,i)=>({e,i})).sort((a,b)=>a.e.z-b.e.z);
  for (const {e,i} of sorted) {
    if (!e.visible && !showHidden) continue;
    drawEl(e, i);
  }
  ctx.save(); ctx.globalAlpha=0.4; ctx.fillStyle='#fff'; ctx.font='10px sans-serif';
  ctx.fillText(`${PRESETS[currentPreset].name} | 1280x720`, 6, 714); ctx.restore();
  updateJson();
}

// ── Sidebar ──
function buildPresets() {
  const wrap = document.getElementById('preset-list');
  wrap.innerHTML = '';
  for (const [k,v] of Object.entries(PRESETS)) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (k === currentPreset ? ' active' : '');
    btn.textContent = v.name;
    btn.onclick = () => switchPreset(k);
    wrap.appendChild(btn);
  }
}

function buildElementList() {
  const wrap = document.getElementById('element-list');
  wrap.innerHTML = '';
  elements.forEach((el, i) => {
    const div = document.createElement('div');
    div.className = 'el-item' + (i === selectedIdx ? ' selected' : '') + (!el.visible ? ' hidden-el' : '');
    const c = COLORS[el.id] || { fill:'#333', border:'#666', label: el.id };
    div.innerHTML = `
      <div class="dot" style="background:${c.fill};border-color:${c.border}"></div>
      <span class="el-name">${c.label}</span>
      <button class="el-vis" title="表示切替">${el.visible ? '👁' : '—'}</button>
    `;
    div.onclick = (e) => { if (e.target.classList.contains('el-vis')) return; selectEl(i); };
    div.querySelector('.el-vis').onclick = () => { el.visible = !el.visible; buildElementList(); render(); };
    wrap.appendChild(div);
  });
}

function selectEl(idx) {
  selectedIdx = idx;
  buildElementList();
  updateProps();
  render();
}

function updateProps() {
  const panel = document.getElementById('prop-panel');
  if (selectedIdx < 0) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  const el = elements[selectedIdx];
  const c = COLORS[el.id] || { label: el.id };
  document.getElementById('prop-title').textContent = c.label;
  document.getElementById('prop-x').value = el.rect.x;
  document.getElementById('prop-y').value = el.rect.y;
  document.getElementById('prop-w').value = el.rect.w;
  document.getElementById('prop-h').value = el.rect.h;
  document.getElementById('prop-opacity').value = Math.round(el.opacity * 100);
  document.getElementById('prop-opacity-val').textContent = Math.round(el.opacity * 100) + '%';
  document.getElementById('prop-z').value = el.z;
}

// prop inputs
['prop-x','prop-y','prop-w','prop-h','prop-z'].forEach(id => {
  document.getElementById(id).oninput = function() {
    if (selectedIdx < 0) return;
    const el = elements[selectedIdx];
    const key = {
      'prop-x':'x','prop-y':'y','prop-w':'w','prop-h':'h','prop-z':'z'
    }[id];
    if (key === 'z') el.z = +this.value;
    else el.rect[key] = +this.value;
    render();
  };
});
document.getElementById('prop-opacity').oninput = function() {
  if (selectedIdx < 0) return;
  elements[selectedIdx].opacity = +this.value / 100;
  document.getElementById('prop-opacity-val').textContent = this.value + '%';
  render();
};

// ── Preset switch ──
function switchPreset(name) {
  currentPreset = name;
  elements = JSON.parse(JSON.stringify(PRESETS[name].elements));
  selectedIdx = -1;
  buildPresets();
  buildElementList();
  updateProps();
  render();
}

// ── Toolbar toggles ──
function toggleGrid() { showGrid = !showGrid; document.getElementById('btn-grid').classList.toggle('on'); render(); }
function toggleLabels() { showLabels = !showLabels; document.getElementById('btn-labels').classList.toggle('on'); render(); }
function toggleHidden() { showHidden = !showHidden; document.getElementById('btn-hidden').classList.toggle('on'); render(); }

function toggleChoice() {
  const el = elements.find(e => e.id === 'choice-window');
  if (el) { el.visible = !el.visible; buildElementList(); render(); }
}
function toggleToast() {
  const el = elements.find(e => e.id === 'toast-notification');
  if (el) { el.visible = !el.visible; buildElementList(); render(); }
}
function toggleDrag() {
  dragEnabled = !dragEnabled;
  document.getElementById('btn-drag').classList.toggle('on');
  canvas.style.cursor = dragEnabled ? 'move' : 'default';
}

// ── Canvas interaction ──
canvas.addEventListener('mousemove', (e) => {
  const r = canvas.getBoundingClientRect();
  const mx = Math.round((e.clientX - r.left) * (1280 / r.width));
  const my = Math.round((e.clientY - r.top) * (720 / r.height));
  document.getElementById('coord-display').textContent = `${mx}, ${my}`;

  if (dragging && dragEnabled) {
    const el = elements[dragging.idx];
    el.rect.x = Math.round((mx - dragging.offsetX) / 8) * 8;
    el.rect.y = Math.round((my - dragging.offsetY) / 8) * 8;
    updateProps();
    render();
  }
});

canvas.addEventListener('mousedown', (e) => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (1280 / r.width);
  const my = (e.clientY - r.top) * (720 / r.height);
  // find top element
  let hit = -1;
  const sorted = elements.map((el,i)=>({el,i})).sort((a,b)=>b.el.z-a.el.z);
  for (const {el,i} of sorted) {
    if (!el.visible && !showHidden) continue;
    const {x,y,w,h} = el.rect;
    if (mx >= x && mx <= x+w && my >= y && my <= y+h) { hit = i; break; }
  }
  selectEl(hit);
  if (hit >= 0 && dragEnabled) {
    const el = elements[hit];
    dragging = { idx: hit, offsetX: mx - el.rect.x, offsetY: my - el.rect.y };
  }
});

canvas.addEventListener('mouseup', () => { dragging = null; });
canvas.addEventListener('mouseleave', () => { dragging = null; });

// ── JSON ──
function toPlayLayout() {
  return {
    version: 1,
    resolution: { width: 1280, height: 720 },
    presetName: currentPreset,
    elements: elements.map(el => ({
      id: el.id,
      rect: { x: el.rect.x, y: el.rect.y, width: el.rect.w, height: el.rect.h },
      visible: el.visible,
      opacity: el.opacity,
      zIndex: el.z,
    })),
  };
}

function updateJson() {
  document.getElementById('json-output').textContent = JSON.stringify(toPlayLayout(), null, 2);
}

function copyJson() {
  navigator.clipboard.writeText(JSON.stringify(toPlayLayout(), null, 2));
}

function exportJson() {
  const blob = new Blob([JSON.stringify(toPlayLayout(), null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `play-layout-${currentPreset}.json`;
  a.click();
}

// ── Init ──
buildPresets();
buildElementList();
render();
</script>
</body>
</html>
